<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceFlow - Sistema de Corridas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-home">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-logo">
                    <span class="logo-icon">🏁</span>
                    <span class="logo-text">RaceFlow</span>
                </div>
                <div class="navbar-links">
                    <a href="index.html" class="nav-link active">Início</a>
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="cadastro.html" class="nav-link">Cadastro</a>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="hero-title">
                        Bem-vindo ao <span class="gradient-text">RaceFlow</span>
                    </h1>
                    <p class="hero-subtitle">
                        O sistema completo para gerenciar corridas, pilotos e voltas
                    </p>
                    <div class="hero-buttons">
                        <a href="login.html" class="btn btn-primary">
                            <span>Entrar no Sistema</span>
                            <span class="btn-arrow">→</span>
                        </a>
                        <a href="cadastro.html" class="btn btn-secondary">
                            Criar Conta
                        </a>
                    </div>
                </div>
                <div class="hero-visual">
                    <div class="neon-circle circle-1"></div>
                    <div class="neon-circle circle-2"></div>
                    <div class="neon-circle circle-3"></div>
                    <div class="hero-icon">🏎️</div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2026 RaceFlow - Sistema de Corridas. Todos os direitos reservados.</p>
                <div class="footer-links">
                    <a href="#">Privacidade</a>
                    <a href="#">Termos</a>
                    <a href="#">Contato</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
